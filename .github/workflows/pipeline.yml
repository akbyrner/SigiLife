name: Main Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        env:
          DATABASE_URL: sqlite://./dummy.db
        run: npx prisma generate --schema=server/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          DATABASE_URL: sqlite://./dummy.db
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.REMOTE_HOST }}" ]; then echo "Error: REMOTE_HOST secret is missing"; exit 1; fi
          if [ -z "${{ secrets.REMOTE_USER }}" ]; then echo "Error: REMOTE_USER secret is missing"; exit 1; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "Error: SSH_PRIVATE_KEY secret is missing"; exit 1; fi

      - name: Build Application
        env:
          DATABASE_URL: sqlite://./dummy.db
        run: |
          npx prisma generate --schema=server/prisma/schema.prisma
          npm run build

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          echo "$SSH_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem
          rsync -avz --progress --delete \
            -e "ssh -i deploy_key.pem -o StrictHostKeyChecking=no" \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'src/' \
            --exclude 'public/' \
            --exclude 'tsconfig.*' \
            --exclude 'vite.config.ts' \
            --exclude 'eslint.config.js' \
            --exclude 'components.json' \
            --exclude 'logs/' \
            --exclude '*.log' \
            ./ $REMOTE_USER@$REMOTE_HOST:~/SigiLife/
          rm deploy_key.pem

      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/SigiLife
            npm install
            npx prisma migrate deploy --schema=server/prisma/schema.prisma
            npx prisma generate --schema=server/prisma/schema.prisma
            pm2 restart sigilife || pm2 start ecosystem.config.cjs --env production
